name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # data is generated at build time; cache the 160 MB GTFS download
      # (feed changes continuously, monthly staleness is fine for CI)
      - id: month
        run: echo "m=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: data/IDFM-gtfs.zip
          key: idfm-gtfs-${{ steps.month.outputs.m }}

      - run: pnpm build

      - run: pnpm --filter site exec playwright install --with-deps chromium

      - run: pnpm --filter site exec playwright test
