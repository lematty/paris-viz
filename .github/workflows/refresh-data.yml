name: Refresh data

# Data artifacts are generated during the Vercel build (see
# apps/site/scripts/ensure-data.mjs), so refreshing = redeploying. The IDFM
# feed only covers ~30 days; twice a month keeps margin if one run fails.
#
# Requires the VERCEL_DEPLOY_HOOK repository secret: Vercel dashboard →
# project → Settings → Git → Deploy Hooks → create one for `main`, then add
# its URL as a secret here.
on:
  schedule:
    - cron: "0 4 1,15 * *" # 04:00 UTC on the 1st and 15th
  workflow_dispatch: # manual run from the Actions tab

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deployment
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is not set — create a Deploy Hook in Vercel and add it as a repository secret."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
